global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: auth-service
    static_configs:
      - targets: ["auth-service:3000"]
    metrics_path: /metrics

  - job_name: todo-service
    static_configs:
      - targets: ["todo-service:3001"]
    metrics_path: /metrics

  - job_name: file-service
    static_configs:
      - targets: ["file-service:3002"]
    metrics_path: /metrics

  - job_name: notification-service
    static_configs:
      - targets: ["notification-service:3003"]
    metrics_path: /metrics

  - job_name: scheduler-service
    static_configs:
      - targets: ["scheduler-service:3004"]
    metrics_path: /metrics
