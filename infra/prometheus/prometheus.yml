global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: auth-service
    static_configs:
      - targets: ["backend:3000"]

  - job_name: todo-service
    static_configs:
      - targets: ["backend:3001"]

  - job_name: file-service
    static_configs:
      - targets: ["backend:3002"]

  - job_name: notification-service
    static_configs:
      - targets: ["backend:3003"]

  - job_name: scheduler-service
    static_configs:
      - targets: ["backend:3004"]
