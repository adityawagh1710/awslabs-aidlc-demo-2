name: Go Service (reusable)

on:
  workflow_call:
    inputs:
      service:
        description: "Service directory name (e.g. auth-service)"
        required: true
        type: string
      image:
        description: "Container image name (e.g. todo-auth-service)"
        required: true
        type: string
      port:
        description: "Health-check port"
        required: true
        type: string
    secrets:
      GHCR_TOKEN:
        required: true
      DEPLOY_HOST:
        required: false
      DEPLOY_USER:
        required: false
      DEPLOY_KEY:
        required: false

jobs:
  # ── Test ────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.service }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ inputs.service }}/go.mod
          cache-dependency-path: ${{ inputs.service }}/go.sum

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Unit & integration tests (with race detector)
        run: go test -race ./... -timeout 180s -coverprofile=coverage.txt -covermode=atomic
        env:
          # Testcontainers uses the Docker socket available on ubuntu-latest
          DOCKER_HOST: unix:///var/run/docker.sock
          TESTCONTAINERS_RYUK_DISABLED: "false"

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ inputs.service }}
          path: ${{ inputs.service }}/coverage.txt
          retention-days: 7

      - name: Vulnerability scan (govulncheck)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # ── Build & push image ───────────────────────────────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    # Only build images on pushes to main (not PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ inputs.image }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=true

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy ──────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            cd ~/app/infra

            # Pull the updated image
            docker compose pull ${{ inputs.service }}

            # Rolling restart — only this service, no downtime for others
            docker compose up -d --no-deps ${{ inputs.service }}

            # Health check — wait up to 60 s
            for i in $(seq 1 12); do
              status=$(curl -sf http://localhost:${{ inputs.port }}/health && echo ok || echo fail)
              [ "$status" = "ok" ] && echo "Healthy after ${i}s" && exit 0
              sleep 5
            done
            echo "Health check failed after 60s" && exit 1
