name: vue-app

on:
  push:
    branches: [main]
    paths:
      - "vue-app/**"
      - ".github/workflows/vue-app.yml"
  pull_request:
    branches: [main]
    paths:
      - "vue-app/**"
      - ".github/workflows/vue-app.yml"

defaults:
  run:
    working-directory: vue-app

jobs:
  # ── Type-check & build ──────────────────────────────────────────────────────
  build:
    name: Type-check & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vue-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check & production build
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: vue-dist
          path: vue-app/dist/
          retention-days: 7

  # ── Cypress E2E ─────────────────────────────────────────────────────────────
  cypress:
    name: Cypress E2E
    runs-on: ubuntu-latest
    needs: build
    # Run full E2E against the real backend stack
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: todoapp
          POSTGRES_USER: todo
          POSTGRES_PASSWORD: todo
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vue-app/package-lock.json

      - name: Install frontend deps
        run: npm ci

      - name: Build backend services
        working-directory: .
        run: |
          for svc in auth-service todo-service file-service notification-service scheduler-service; do
            echo "Building $svc..."
            (cd $svc && go build -o bin/$svc ./cmd/main.go)
          done

      - name: Start backend services
        working-directory: .
        env:
          DATABASE_URL: postgres://todo:todo@localhost:5432/todoapp?sslmode=disable
          JWT_SECRET: ci-test-secret-at-least-32-chars-ok
          REDIS_URL: redis://localhost:6379/0
          ELASTICSEARCH_URL: ""
          INTERNAL_API_KEY: ci-internal-key
          FILE_STORAGE_PATH: /tmp/uploads
          LOG_LEVEL: warn
        run: |
          mkdir -p /tmp/uploads
          ./auth-service/bin/auth-service &
          ./todo-service/bin/todo-service &
          ./file-service/bin/file-service &
          ./notification-service/bin/notification-service &
          ./scheduler-service/bin/scheduler-service &

          # Wait for all health endpoints
          for port in 3000 3001 3002 3003 3004; do
            for i in $(seq 1 20); do
              curl -sf http://localhost:$port/health && break
              sleep 2
            done
          done

      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          working-directory: vue-app
          start: npm run dev
          wait-on: "http://localhost:5173"
          wait-on-timeout: 60
          browser: chrome
          headed: false

      - name: Upload Cypress screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: vue-app/cypress/screenshots/
          retention-days: 7

  # ── Build & push image ───────────────────────────────────────────────────────
  push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [build, cypress]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/todo-vue-app
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=true

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: vue-app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy ──────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            cd ~/app/infra
            docker compose pull vue-app
            docker compose up -d --no-deps vue-app
